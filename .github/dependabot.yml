version: 2
updates:
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
  - package-ecosystem: github-actions # See documentation for possible values
    directory: "/" # Location of package manifests
    schedule:
      interval: weekly
    groups:
      all:
        dependency-type: "production"
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
